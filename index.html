<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futures Consciousness Scale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <div class="header-row">
        <h1 id="appTitle">Futures Consciousness Scale</h1>
        <div class="lang-toggle" role="tablist" aria-label="Language">
          <button id="langEn" class="lang-btn active" type="button" data-lang="en">EN</button>
          <button id="langNo" class="lang-btn" type="button" data-lang="no">NO</button>
        </div>
      </div>
      <p class="subtitle" id="appSubtitle"></p>
    </header>

    <section id="intro" class="card">
      <h2 id="introHeading"></h2>
      <ol id="introSteps"></ol>
      <p class="disclaimer" id="disclaimer"></p>
      <p class="ref" id="version"></p>
      <p class="privacy" id="privacy">
        <svg class="privacy-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="m8.5 12 2.5 2.5L16 9.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="privacyText"></span>
      </p>
      <details class="about">
        <summary id="aboutSummary"></summary>
        <p id="aboutBody"></p>
      </details>
      <div class="actions">
        <button id="startBtn" class="primary"></button>
      </div>
    </section>

    <section id="questionnaire" class="card hidden">
      <div class="progress">
        <div class="progress-segments" id="progressSegments"></div>
        <span id="progressText"></span>
      </div>
      <p class="kbd-hint" id="kbdHint"></p>
      <form id="questionsForm"></form>
      <div class="actions">
        <button id="resetBtn" type="button"></button>
        <button id="submitBtn" class="primary" type="button" disabled></button>
      </div>
    </section>

    <section id="results" class="card hidden">
      <h2 id="resultsHeading"></h2>
      <div class="results-grid">
        <div class="chart-wrapper">
          <svg id="radarChart" viewBox="-270 -270 540 540" aria-label="Star diagram"></svg>
        </div>
        <div id="scoresList" class="scores"></div>
      </div>
      <div id="descriptions" class="descriptions"></div>
      <div class="actions">
        <button id="retakeBtn" type="button"></button>
        <button id="downloadBtn" class="primary" type="button"></button>
      </div>
    </section>

    <footer>
      <p id="reference"></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
