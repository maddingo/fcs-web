<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futures Consciousness Scale</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <div class="header-row">
        <h1 id="appTitle">Futures Consciousness Scale</h1>
        <div class="lang-toggle" role="tablist" aria-label="Language">
          <button id="langEn" class="lang-btn active" type="button" data-lang="en">EN</button>
          <button id="langNo" class="lang-btn" type="button" data-lang="no">NO</button>
        </div>
      </div>
      <p class="subtitle" id="appSubtitle"></p>
    </header>

    <section id="intro" class="card">
      <h2 id="introHeading"></h2>
      <ol id="introSteps"></ol>
      <p class="disclaimer" id="disclaimer"></p>
      <p class="ref" id="version"></p>
      <div class="actions">
        <button id="startBtn" class="primary"></button>
      </div>
    </section>

    <section id="questionnaire" class="card hidden">
      <div class="progress">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <span id="progressText"></span>
      </div>
      <form id="questionsForm"></form>
      <div class="actions">
        <button id="resetBtn" type="button"></button>
        <button id="submitBtn" class="primary" type="button" disabled></button>
      </div>
    </section>

    <section id="results" class="card hidden">
      <h2 id="resultsHeading"></h2>
      <div class="results-grid">
        <div class="chart-wrapper">
          <svg id="radarChart" viewBox="-220 -220 440 440" aria-label="Star diagram"></svg>
        </div>
        <div id="scoresList" class="scores"></div>
      </div>
      <div id="descriptions" class="descriptions"></div>
      <div class="actions">
        <button id="retakeBtn" type="button"></button>
        <button id="downloadBtn" class="primary" type="button"></button>
      </div>
    </section>

    <footer>
      <p id="reference"></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
